<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Memory Lane</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", Arial, sans-serif;
        background: linear-gradient(145deg, #0d1b2a, #1b263b);
        color: #e0e6ed;
        width: 300px;
        padding: 16px;
        border-radius: 10px;
        box-shadow: 0 0 15px rgba(0, 255, 255, 0.1);
        margin: 0;
      }

      h3 {
        text-align: center;
        color: #00ffff;
        text-shadow: 0 0 6px rgba(0, 255, 255, 0.4);
        margin-bottom: 8px;
      }

      h4 {
        margin-top: 16px;
        color: #9ad9d9;
        border-bottom: 1px solid rgba(0, 255, 255, 0.2);
        padding-bottom: 4px;
      }

      #status {
        font-size: 0.9rem;
        margin-bottom: 8px;
        text-align: center;
        min-height: 20px;
      }

      label {
        font-weight: 600;
        font-size: 0.9rem;
        margin-top: 10px;
        display: block;
      }

      /* === Inputs & Buttons === */
      input[type="text"],
      button,
      select {
        margin-top: 8px;
        width: 100%;
        padding: 8px 10px;
        border-radius: 6px;
        border: none;
        outline: none;
        font-size: 0.9rem;
        transition: all 0.25s ease;
      }

      input[type="text"] {
        background: rgba(255, 255, 255, 0.08);
        color: #e0e6ed;
      }

      input:focus {
        background: rgba(0, 255, 255, 0.12);
        border: 1px solid #00ffff;
        box-shadow: 0 0 8px rgba(0, 255, 255, 0.3);
      }

      button {
        background: #00ffff;
        color: #0d1b2a;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
      }

      button:hover {
        background: #7ef9f9;
        box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
      }

      /* === Styled Dropdown === */
      select {
        appearance: none;
        background: rgba(255, 255, 255, 0.08);
        color: #e0e6ed;
        border: 1px solid rgba(255, 255, 255, 0.1);
        font-weight: 500;
        position: relative;
        padding-right: 30px;
        cursor: pointer;
      }

      select:focus {
        border: 1px solid #00ffff;
        box-shadow: 0 0 8px rgba(0, 255, 255, 0.3);
        background: rgba(0, 255, 255, 0.1);
      }

      /* Custom arrow */
      select::-ms-expand {
        display: none;
      }
      .select-wrapper {
        position: relative;
        display: inline-block;
        width: 100%;
      }

      .select-wrapper::after {
        content: "▼";
        font-size: 0.7rem;
        color: #00ffff;
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        pointer-events: none;
        transition: transform 0.2s ease;
      }

      .select-wrapper:focus-within::after {
        transform: translateY(-50%) rotate(180deg);
      }

      /* === Tracked Sites === */
      .site-list {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 6px;
        padding: 6px;
        max-height: 100px;
        overflow-y: auto;
        font-size: 0.85rem;
        box-shadow: inset 0 0 5px rgba(0, 255, 255, 0.05);
      }

      .site-item {
        background: rgba(255, 255, 255, 0.08);
        margin-bottom: 4px;
        padding: 4px 8px;
        border-radius: 4px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .site-item span {
        flex: 1;
      }

      .site-item button {
        width: auto;
        padding: 3px 8px;
        font-size: 0.75rem;
        border-radius: 4px;
        background: #ff4d4d;
        color: white;
        box-shadow: none;
      }

      .site-item button:hover {
        background: #ff6666;
      }

      hr {
        margin: 16px 0;
        border: none;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
      }

      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-thumb {
        background-color: rgba(0, 255, 255, 0.3);
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <h3>🧠 Memory Lane Snapshot</h3>
    <div id="status"></div>

    <label for="durationSelect"><b>Tracking Duration:</b></label>
    <div class="select-wrapper">
      <select id="durationSelect">
        <option value="15">15 minutes</option>
        <option value="30">30 minutes</option>
        <option value="60" selected>1 hour</option>
        <option value="120">2 hours</option>
      </select>
    </div>

    <button id="toggleTracking">Start Tracking</button>

    <hr />
    <h4>Tracked Sites</h4>
    <div class="site-list" id="siteList">
      <div class="site-item">
        <span>medium.com</span>
        <button>✕</button>
      </div>
      <div class="site-item">
        <span>youtube.com</span>
        <button>✕</button>
      </div>
    </div>

    <input
      type="text"
      id="newSite"
      placeholder="Add custom site (e.g. medium.com)"
    />
    <button id="addSite">Add Site</button>

    <script src="popup.js"></script>
  </body>
</html>
